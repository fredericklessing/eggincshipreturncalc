<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Inc. Ship Return Calculator</title>
    <link rel="icon" type="image/jpeg" href="https://eggincgame.com/image/stardust.jpg">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-image: url('');
        }

        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            filter: blur(25px) brightness(0.7);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            z-index: -1;
        }

        img {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .container {
            background-color: #16213e;
            border: 2px solid #f4a91f;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 0 30px rgba(244, 169, 31, 0.2);
        }

        h1 {
            text-align: center;
            color: #f4a91f;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background-color: #0f3460;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #f4a91f;
        }

        select option {
            background-color: #0f3460;
        }



        .ship-selector {
            margin-bottom: 20px;
        }

        .ship-selector-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .apply-ship-btn {
            width: 100%;
            padding: 9px;
            background-color: #0f3460;
            border: 1px solid #f4a91f;
            border-radius: 8px;
            color: #f4a91f;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .apply-ship-btn:hover {
            background-color: #1a4a80;
        }

        .travel-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .travel-row .form-group {
            margin-bottom: 0;
        }

        .travel-row label {
            font-size: 0.8rem;
        }

        .selected-duration {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            min-height: 20px;
            margin-top: 6px;
        }

        .selected-duration span {
            color: #f4a91f;
            font-weight: bold;
        }

        .btn-calculate {
            width: 100%;
            padding: 12px;
            background-color: #f4a91f;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-calculate:hover {
            background-color: #ffc233;
        }

        .btn-calculate:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 24px;
            background-color: #0f3460;
            border: 1px solid #f4a91f;
            border-radius: 10px;
            padding: 20px;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .result-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .result-info {
            flex: 1;
        }

        .result-icon-box {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border: 2px solid #f4a91f;
            border-radius: 8px;
            background-color: rgba(244, 169, 31, 0.1);
        }

        .result-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .result-label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }

        .result-time {
            font-size: 1.6rem;
            font-weight: bold;
            color: #f4a91f;
            margin-bottom: 4px;
        }

        .result-date {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 16px;
        }

        .result-duration {
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px solid #333;
            padding-top: 12px;
        }

        .result-duration span {
            color: #e0e0e0;
        }

        .now-btn {
            background: none;
            border: none;
            color: #f4a91f;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 10px;
            text-decoration: underline;
            padding: 0;
        }

        .now-btn:hover {
            color: #ffc233;
        }

        .section-divider {
            border: none;
            border-top: 1px solid #333;
            margin: 20px 0;
        }

        .section-title {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .upgrade-section {
            background-color: #0a1f35;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: auto 1fr 1fr;
            align-items: center;
            gap: 16px;
        }

        .ftl-checkbox-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .upgrade-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 0 0 auto;
        }

        .ftl-checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #f4a91f;
        }

        .ftl-checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            color: #ccc;
        }

        .upgrade-input-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .upgrade-input-group img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .upgrade-input-group input {
            padding: 6px;
            font-size: 0.9rem;
        }

        .upgrade-value {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 2px;
        }

        .tier-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: bold;
        }

        .tier-short  { background: #2e5e2e; color: #7dff7d; }
        .tier-long   { background: #5e3e2e; color: #ffb97d; }
        .tier-epic   { background: #3e2e5e; color: #c97dff; }

        .ship-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-right: 8px;
            vertical-align: middle;
        }

        .ship-option-display {
            display: flex;
            align-items: center;
        }

        .selected-ship-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            padding: 10px;
            background-color: #0f3460;
            border-radius: 8px;
        }

        .selected-ship-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-right: 8px;
            flex-shrink: 0;
            display: inline-block;
        }

        .ship-details-text {
            flex: 0 1 auto;
            text-align: center;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
        }

        .fuel-requirements {
            flex: 1;
            margin-top: 0;
            padding: 10px;
            background-color: #0a1f35;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .ship-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .ship-title-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .ship-capacity-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(244, 169, 31, 0.12);
            border: 1px solid rgba(244, 169, 31, 0.35);
            border-radius: 8px;
            padding: 6px 12px;
            min-width: 90px;
        }

        .fuel-section-title {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }

        .fuel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
        }

        .fuel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .fuel-item-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            width: 100%;
        }

        .fuel-item-icon {
            width: 24px;
            height: 24px;
        }

        .fuel-amount {
            font-weight: bold;
            color: #f4a91f;
            font-size: 0.95rem;
        }

        .fuel-name {
            color: #aaa;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Ship Return Calculator</h1>
    <p class="subtitle">Egg Inc. — Plan your missions before you launch</p>

    <!-- Launch Time -->
    <div class="form-group">
        <label>
            Launch Date &amp; Time
            <button class="now-btn" onclick="setNow()">Use Now</button>
        </label>
        <input type="datetime-local" id="launchTime" step="1">
    </div>

    <hr class="section-divider">

    <!-- Ship Selector -->
    <div class="ship-selector">
        <div class="section-title">Select Ship &amp; Mission Type</div>
        <div class="ship-selector-row">
            <div class="form-group" style="margin-bottom:0">
                <label>Ship</label>
                <select id="shipSelect" onchange="onShipChange()">
                    <option value="">— Choose a ship —</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
                <label>Mission Type</label>
                <select id="missionSelect" onchange="onMissionChange()">
                    <option value="">— Choose mission —</option>
                </select>
            </div>
        </div>
        <div class="selected-duration" id="selectedDuration"></div>
        <div class="selected-ship-info" id="selectedShipInfo" style="display:none;"></div>
    </div>

    <hr class="section-divider">

    <!-- Upgrades Section -->
    <div class="section-title">Upgrades</div>
    <div class="upgrade-section">
        <div class="ftl-checkbox-group">
            <input type="checkbox" id="fullyResearchedFTL" onchange="onFTLFullyResearched()">
            <label for="fullyResearchedFTL">Max Upgrades</label>
        </div>
        <div class="upgrade-input-group">
            <label for="ftlLevel">
                <img src="https://static.wikia.nocookie.net/egg-inc/images/6/6f/Epic_mission_duration.png/revision/latest?cb=20211024235151" alt="FTL">
                FTL Drive (Travel Time)
            </label>
            <input type="number" id="ftlLevel" min="0" max="60" value="0" onchange="onUpgradeChange()">
            <div class="upgrade-value" id="ftlValue">0% reduction</div>
        </div>
        <div class="upgrade-input-group">
            <label for="zeroGLevel">
                <img src="https://static.wikia.nocookie.net/egg-inc/images/6/62/Epic_mission_capacity.png/revision/latest?cb=20211024235220" alt="Zero-G">
                Zero-G Containment (Capacity)
            </label>
            <input type="number" id="zeroGLevel" min="0" max="10" value="0" onchange="onUpgradeChange()">
            <div class="upgrade-value" id="zeroGValue">0% increase</div>
        </div>
    </div>

    <!-- Ship Stars Section -->
    <div class="section-title">Ship Stars</div>
    <div style="padding: 12px; background-color: #0a1f35; border-radius: 8px; margin-bottom: 12px;">
        <label for="shipStars" style="display: block; margin-bottom: 8px; color: #ccc;">
            ⭐ Ship Star Level
        </label>
        <input type="range" id="shipStars" min="0" max="8" value="0" onchange="onUpgradeChange()" style="width: 100%; height: 6px; cursor: pointer;">
        <div style="text-align: center; margin-top: 8px; font-size: 1.2rem; color: #f4a91f;" id="starsDisplay">★☆☆☆☆☆☆☆</div>
    </div>

    <!-- Manual Travel Time Fine-Tune -->
    <div class="section-title">Travel Time (manual / fine-tune)</div>
    <div class="travel-row">
        <div class="form-group">
            <label>Days</label>
            <input type="number" id="days" min="0" value="0" placeholder="0">
        </div>
        <div class="form-group">
            <label>Hours</label>
            <input type="number" id="hours" min="0" max="23" value="0" placeholder="0">
        </div>
        <div class="form-group">
            <label>Minutes</label>
            <input type="number" id="minutes" min="0" max="59" value="0" placeholder="0">
        </div>
        <div class="form-group">
            <label>Seconds</label>
            <input type="number" id="seconds" min="0" max="59" value="0" placeholder="0">
        </div>
    </div>

    <hr class="section-divider">

    <button class="btn-calculate" onclick="calculate()">Calculate Return Time</button>

    <!-- Result -->
    <div class="result-box" id="resultBox">
        <div class="result-content">
            <div class="result-info">
                <div class="result-label">🛬 Ship Returns At</div>
                <div class="result-time" id="resultTime"></div>
                <div class="result-date" id="resultDate"></div>
                <div class="result-duration">
                    Total travel duration: <span id="resultDuration"></span>
                </div>
            </div>
            <div class="result-icon-box">
                <img src="https://static.wikia.nocookie.net/egg-inc/images/7/72/Icon_afx_chest_3.png/revision/latest/scale-to-width-down/55?cb=20211024211857" alt="Reward" class="result-icon">
            </div>
        </div>
    </div>
</div>

// ─────────────────────────────────────────────────────────────
//  Build ship dropdown on load
// ─────────────────────────────────────────────────────────────
function buildShipDropdown() {
    const sel = document.getElementById('shipSelect');
    SHIPS.forEach((ship, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = ship.name;
        sel.appendChild(opt);
    });
}

function onShipChange() {
    const shipIdx = document.getElementById('shipSelect').value;
    const missionSel = document.getElementById('missionSelect');
    missionSel.innerHTML = '<option value="">— Choose mission —</option>';
    document.getElementById('selectedDuration').innerHTML = '';

    if (shipIdx === '') return;

    // Reset star slider for new ship
    const ship = SHIPS[shipIdx];
    const starSlider = document.getElementById('shipStars');
    starSlider.max = ship.maxStars || 8;
    starSlider.value = 0;
    updateStarsDisplay(0, ship.maxStars || 8);

    ship.missions.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        const tierClass = m.type === 'Short' ? 'Short' : m.type === 'Long' ? 'Long' : 'Epic';
        opt.textContent = m.label;
        opt.dataset.tier = tierClass;
        missionSel.appendChild(opt);
    });
}

function onMissionChange() {
    const shipIdx    = document.getElementById('shipSelect').value;
    const missionIdx = document.getElementById('missionSelect').value;
    const durEl      = document.getElementById('selectedDuration');
    const infoEl     = document.getElementById('selectedShipInfo');

    if (shipIdx === '' || missionIdx === '') {
        durEl.innerHTML = '';
        infoEl.style.display = 'none';
        document.getElementById('fullyResearchedFTL').checked = false;
        document.getElementById('ftlLevel').value = 0;
        document.getElementById('zeroGLevel').value = 0;
        document.getElementById('shipStars').value = 0;
        updateStarsDisplay(0, 0);
        return;
    }

    const ship = SHIPS[shipIdx];
    const m = ship.missions[missionIdx];
    const parts = [];
    if (m.d > 0) parts.push(`${m.d}d`);
    if (m.h > 0) parts.push(`${m.h}h`);
    if (m.m > 0) parts.push(`${m.m}m`);
    if (m.s > 0) parts.push(`${m.s}s`);
    const dStr = parts.join(' ') || '0s';

    durEl.innerHTML = `${ship.name} — ${m.type}: <span>${dStr}</span>`;
    
    // Auto-apply travel time (before upgrades are applied)
    document.getElementById('days').value    = m.d;
    document.getElementById('hours').value   = m.h;
    document.getElementById('minutes').value = m.m;
    document.getElementById('seconds').value = m.s;
    
    // Display ship icon and mission-specific fuel info with egg type icons and readable names
    if (ship.icon) {
        // Friendly display names for egg keys
        const EGG_DISPLAY = {
            rocketfuel: 'Rocket Fuel Eggs',
            fusion: 'Fusion Eggs',
            graviton: 'Graviton Eggs',
            dilithium: 'Dilithium Eggs',
            antimatter: 'Antimatter Eggs',
            darkmatter: 'Dark Matter Eggs',
            humility: 'Humility Eggs',
            integrity: 'Integrity Eggs',
            curiosity: 'Curiosity Eggs',
            kindness: 'Kindness Eggs',
            tachyon: 'Tachyon Eggs',
            resilience: 'Resilience Eggs',
            superfood: 'Superfood Eggs'
        };

        const makeLabel = (eggKey) => {
            if (!eggKey) return '';
            return EGG_DISPLAY[eggKey] || (eggKey.charAt(0).toUpperCase() + eggKey.slice(1) + ' Eggs');
        };

        let fuelHTML = '';

        if (m.fuels && m.fuels.length > 0) {
            fuelHTML += '<div class="fuel-requirements"><span class="fuel-section-title">⛽ Fuel Required</span><div class="fuel-grid">';
            m.fuels.forEach(f => {
                const name = makeLabel(f.egg);
                fuelHTML += `<div class="fuel-item"><div class="fuel-item-header"><img src="${f.icon}" alt="${f.egg}" class="fuel-item-icon"><span class="fuel-amount">${f.amount}</span></div><div class="fuel-name">${name}</div></div>`;
            });
            fuelHTML += '</div></div>';
        }

        if (m.virtueFuels && m.virtueFuels.length > 0) {
            fuelHTML += '<div class="fuel-requirements"><span class="fuel-section-title">✨ Virtue Fuel</span><div class="fuel-grid">';
            m.virtueFuels.forEach(f => {
                const name = makeLabel(f.egg);
                fuelHTML += `<div class="fuel-item"><div class="fuel-item-header"><img src="${f.icon}" alt="${f.egg}" class="fuel-item-icon"><span class="fuel-amount">${f.amount}</span></div><div class="fuel-name">${name}</div></div>`;
            });
            fuelHTML += '</div></div>';
        }

        // Add artifact capacity display
        const zeroGLevel = parseInt(document.getElementById('zeroGLevel').value) || 0;
        const starLevel = parseInt(document.getElementById('shipStars').value) || 0;
        const baseCapacity = m.capacity || 0;
        const bumpPerStar = m.capacityBumpPerStar || 0;
        const capacityWithStars = baseCapacity + (starLevel * bumpPerStar);
        const adjustedCapacity = Math.floor(capacityWithStars * (1 + Math.min(zeroGLevel, 10) * 0.05));
        const totalBonus = adjustedCapacity - baseCapacity;
        const capacityLabel = totalBonus > 0 ? `${baseCapacity} (+${totalBonus}) = ${adjustedCapacity}` : `${adjustedCapacity}`;

        // Update star slider max for this ship
        const maxStars = ship.maxStars || 8;
        const starSlider = document.getElementById('shipStars');
        const currentStars = parseInt(starSlider.value) || 0;
        starSlider.max = maxStars;
        if (currentStars > maxStars) starSlider.value = maxStars;
        updateStarsDisplay(parseInt(starSlider.value), maxStars);

        infoEl.innerHTML = `
            <div class="ship-title-row">
                <img src="${ship.icon}" alt="${ship.name}" class="selected-ship-icon" onerror="this.style.display='none'">
                <div class="ship-title-center">
                    <strong>${ship.name}</strong>
                    <small>${m.type}: ${dStr}</small>
                </div>
                <div class="ship-capacity-badge">
                    <span style="font-size:0.7rem; color:#f4a91f; display:flex; align-items:center; gap:4px; white-space:nowrap;"><img src="https://static.wikia.nocookie.net/egg-inc/images/7/72/Icon_afx_chest_3.png/revision/latest?cb=20211024211857" style="width:16px;height:16px;"> Artifact Capacity</span>
                    <span id="capacityDisplay" style="font-size:1.05rem; font-weight:bold; color:#f4a91f; white-space:nowrap;">${capacityLabel}</span>
                </div>
            </div>
            <div class="ship-details-text">${fuelHTML}</div>`;
        infoEl.style.display = 'flex';
    }
}

function onFTLFullyResearched() {
    const isChecked = document.getElementById('fullyResearchedFTL').checked;
    document.getElementById('ftlLevel').value = isChecked ? 60 : 0;
    document.getElementById('zeroGLevel').value = isChecked ? 10 : 0;
    onUpgradeChange();
}

function updateStarsDisplay(currentStars, maxStars) {
    const display = document.getElementById('starsDisplay');
    if (!display) return;
    let html = '';
    for (let i = 1; i <= maxStars; i++) {
        html += i <= currentStars ? '★' : '☆';
    }
    display.textContent = html || '—';
}

function onUpgradeChange() {
    const shipIdx    = document.getElementById('shipSelect').value;
    const missionIdx = document.getElementById('missionSelect').value;

    if (shipIdx === '' || missionIdx === '') return;

    const ship = SHIPS[shipIdx];
    const m = ship.missions[missionIdx];
    const ftlLevel  = parseInt(document.getElementById('ftlLevel').value)  || 0;
    const zeroGLevel = parseInt(document.getElementById('zeroGLevel').value) || 0;
    const starLevel  = parseInt(document.getElementById('shipStars').value)  || 0;
    const maxStars   = ship.maxStars || 8;

    // Update star display
    updateStarsDisplay(starLevel, maxStars);

    // FTL Drive: reduces travel time by 1% per level (max 60%)
    const ftlReduction = Math.min(ftlLevel, 60) * 0.01;
    // Zero-G: increases capacity by 5% per level (max 50%)
    const zeroGMultiplier = Math.min(zeroGLevel, 10) * 0.05;

    // Update display values
    document.getElementById('ftlValue').textContent  = `${Math.round(ftlReduction * 100)}% reduction`;
    document.getElementById('zeroGValue').textContent = `${Math.round(zeroGMultiplier * 100)}% increase`;

    // Calculate adjusted base travel time
    const totalBaseSeconds = (m.d * 86400) + (m.h * 3600) + (m.m * 60) + m.s;
    const adjustedSeconds  = totalBaseSeconds * (1 - ftlReduction);

    // Update the manual travel time inputs
    const days      = Math.floor(adjustedSeconds / 86400);
    const remaining1 = adjustedSeconds % 86400;
    const hours     = Math.floor(remaining1 / 3600);
    const remaining2 = remaining1 % 3600;
    const minutes   = Math.floor(remaining2 / 60);
    const seconds   = Math.round(remaining2 % 60);

    document.getElementById('days').value    = days;
    document.getElementById('hours').value   = hours;
    document.getElementById('minutes').value = minutes;
    document.getElementById('seconds').value = seconds;

    // Update capacity display: stars add flat capacity, then Zero-G multiplies, then floor
    const baseCapacity    = m.capacity || 0;
    const bumpPerStar     = m.capacityBumpPerStar || 0;
    const capacityWithStars  = baseCapacity + (starLevel * bumpPerStar);
    const adjustedCapacity   = Math.floor(capacityWithStars * (1 + zeroGMultiplier));
    const totalBonus = adjustedCapacity - baseCapacity;

    const capacityDisplay = document.getElementById('capacityDisplay');
    if (capacityDisplay) {
        capacityDisplay.textContent = totalBonus > 0 ? `${baseCapacity} (+${totalBonus}) = ${adjustedCapacity}` : `${adjustedCapacity}`;
    }
}

function applyShipTime() {
    const shipIdx    = document.getElementById('shipSelect').value;
    const missionIdx = document.getElementById('missionSelect').value;

    if (shipIdx === '' || missionIdx === '') {
        alert('Please select a ship and mission type first.');
        return;
    }

    const m = SHIPS[shipIdx].missions[missionIdx];
    document.getElementById('days').value    = m.d;
    document.getElementById('hours').value   = m.h;
    document.getElementById('minutes').value = m.m;
    document.getElementById('seconds').value = m.s;
}

// ─────────────────────────────────────────────────────────────
//  Core calculator logic
// ─────────────────────────────────────────────────────────────
function setNow() {
    document.getElementById('launchTime').value = toLocalInputString(new Date());
}

function toLocalInputString(date) {
    const pad = n => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function calculate() {
    const launchVal = document.getElementById('launchTime').value;
    if (!launchVal) {
        alert('Please enter a launch date and time.');
        return;
    }

    const launch  = new Date(launchVal);
    const days    = parseInt(document.getElementById('days').value)    || 0;
    const hours   = parseInt(document.getElementById('hours').value)   || 0;
    const minutes = parseInt(document.getElementById('minutes').value) || 0;
    const seconds = parseInt(document.getElementById('seconds').value) || 0;

    const totalSeconds = (days * 86400) + (hours * 3600) + (minutes * 60) + seconds;

    if (totalSeconds <= 0) {
        alert('Please enter a travel time greater than zero.');
        return;
    }

    const returnTime = new Date(launch.getTime() + totalSeconds * 1000);

    const timeStr = returnTime.toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    const dateStr = returnTime.toLocaleDateString([], {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('resultTime').textContent     = timeStr;
    document.getElementById('resultDate').textContent     = dateStr;
    document.getElementById('resultDuration').textContent = buildDurationString(days, hours, minutes, seconds);

    document.getElementById('resultBox').classList.add('visible');
}

function buildDurationString(d, h, m, s) {
    const parts = [];
    if (d > 0) parts.push(`${d}d`);
    if (h > 0) parts.push(`${h}h`);
    if (m > 0) parts.push(`${m}m`);
    if (s > 0) parts.push(`${s}s`);
    return parts.length ? parts.join(' ') : '0s';
}
